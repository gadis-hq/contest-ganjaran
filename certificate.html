
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sijil Pemenang</title>  
<style>
  .result-box {
  animation: fadeIn 0.8s ease-in-out;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
body{background:#fff0f5;text-align:center;padding:60px;font-family:serif;}
.card{border:8px solid #d4af37;padding:50px;background:white;}
h1{color:#d4af37;}
.name{font-size:28px;color:#c71585;margin:20px;}
</style>
</head>
<body>
<img src="logo.png" style="width:120px;margin-bottom:10px;">  
<div class="card">
<h1>SIJIL RASMI PENEBUS GANJARAN</h1>
<p>Dengan ini disahkan bahawa</p>
<div class="name" id="winnerName"></div>
<p>layak untuk tebus ganjaran RM50,000</p>
</div>
<button onclick="generatePDF()">Download PDF</button>
<button onclick="downloadPDF()">Muat Turun Sijil PDF</button>  

<script>
function generatePDF(){
  const name = document.getElementById("winnerName").innerText;
  const canvas = document.createElement("canvas");

  QRCode.toCanvas(canvas, window.location.href, function(){
    const win = window.open('');
    win.document.write(document.body.innerHTML);
    win.document.body.appendChild(canvas);
    win.print();
  });
}

function downloadPDF() {
  const element = document.querySelector(".result-box");
  html2pdf().from(element).save("Sijil_Ganjaran.pdf");
}  
</script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  
<script>
const params=new URLSearchParams(window.location.search);
document.getElementById("winnerName").innerText=params.get("name");
</script>
</body>
</html>
