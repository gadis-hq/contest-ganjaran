<!DOCTYPE html>
<html>
<head>
  <title>Semakan Kod Siri Gadis QS</title>
</head>
<style>
body {
  font-family: Arial, sans-serif;
  background: #f4f6f9;
}

.result-box {
  position: relative;
  padding: 25px;
  margin-top: 20px;
  border-radius: 12px;
  color: #333;
  overflow: hidden;
}

.box-success {
  background: #e8f9f0;
  border: 2px solid #28a745;
}

.box-active {
  background: #fff8e6;
  border: 2px solid #ffc107;
}

.box-error {
  background: #fdeaea;
  border: 2px solid #dc3545;
}

.watermark {
  position: absolute;
  top: 40%;
  left: 10%;
  font-size: 40px;
  color: rgba(0,0,0,0.05);
  transform: rotate(-20deg);
  pointer-events: none;
  font-weight: bold;
}

.qr-badge {
  margin-top: 15px;
}
</style>
<body>

  <h2>Semakan Rasmi Kod Siri</h2>
<input type="text" id="kodInput" placeholder="Masukkan Kod Siri">
<button onclick="checkKod()">Semak</button>
<div id="result"></div>

<script src="https://cdn.jsdelivr.net/npm/qrcodejs/qrcode.min.js"></script>
  
<script>
const SHEET_ID = "2PACX-1vT-A0gknoeLsL-Sdrcqt1rYXp-LrnPDYZ6NpUcxq-1x6aA4vRXdTrNwD6NZT3wtSEo3Qtemz5fk_5w8";
const sheetKodSiri = "KOD_SIRI";
const sheetPenebusan = "DATA_PENEBUSAN";

async function checkKod() {
  const kodInput = document.getElementById("kodInput").value.trim();
  
  const url1 = `https://opensheet.elk.sh/${SHEET_ID}/${sheetKodSiri}`;
  const url2 = `https://opensheet.elk.sh/${SHEET_ID}/${sheetPenebusan}`;

  const [res1, res2] = await Promise.all([
    fetch(url1).then(r => r.json()),
    fetch(url2).then(r => r.json())
  ]);

  const kodData = res1.find(row => row["KOD SIRI"] === kodInput);

  // ❌ TIDAK WUJUD
  if (!kodData) {
    return showStyledResult("error", `
  <h3>❌ KOD TIDAK WUJUD</h3>
  <p>Kod siri tiada dalam rekod rasmi sistem.</p>
`, "");
  }

  // 🟡 AKTIF / BELUM DITEBUS
  if (kodData["STATUS KOD"] === "AKTIF / BELUM DITEBUS") {
    return showStyledResult("active", `
  <h3>STATUS KOD AKTIF</h3>
  <p><strong>KOD SIRI:</strong> ${kodData["KOD SIRI"]}</p>
  <p><strong>HADIAH:</strong> ${kodData["HADIAH"]}</p>
  <p><strong>STATUS KOD:</strong> ${kodData["STATUS KOD"]}</p>
  <p><strong>PEMBELIAN PRODUK:</strong> ${kodData["PEMBELIAN PRODUK"]}</p>
  <p><strong>HARGA:</strong> ${kodData["HARGA"]}</p>
  <p><strong>STATUS PENEBUSAN:</strong> BELUM DITEBUS</p>
  <p><strong>DISAHKAN OLEH:</strong> GADIS QS HQ</p>
`, kodInput);
  }

  // 🟢 SAH / TELAH DITEBUS
  if (kodData["STATUS KOD"] === "SAH / TELAH DITEBUS") {

    const penebusanData = res2.find(row => row["KOD SIRI"] === kodInput);

    if (!penebusanData) {
      return showResult("Data penebusan tidak ditemui.");
    }

    return showStyledResult("success", `
  <h3>MAKLUMAT PENEBUSAN RASMI</h3>
  <p><strong>KOD SIRI:</strong> ${kodData["KOD SIRI"]}</p>
  <p><strong>NAMA PENUH:</strong> ${kodData["NAMA PENUH"]}</p>
  <p><strong>NO. IC:</strong> ${penebusanData["NO. IC"]}</p>
  <p><strong>NO. TELEFON:</strong> ${penebusanData["NO. TELEFON"]}</p>
  <p><strong>HADIAH:</strong> ${kodData["HADIAH"]}</p>
  <p><strong>STATUS KOD:</strong> ${kodData["STATUS KOD"]}</p>
  <p><strong>PEMBELIAN PRODUK:</strong> ${kodData["PEMBELIAN PRODUK"]}</p>
  <p><strong>HARGA:</strong> ${kodData["HARGA"]}</p>
  <p><strong>STATUS PENEBUSAN:</strong> ${penebusanData["STATUS PENEBUSAN"]}</p>
  <p><strong>DISAHKAN OLEH:</strong> ${penebusanData["DISAHKAN OLEH"]}</p>
  <p><strong>TARIKH:</strong> ${penebusanData["TARIKH"]}</p>
  <p><strong>BANDAR / NEGERI:</strong> ${penebusanData["BANDAR / NEGERI"]}</p>
`, kodInput);
  }

  // Fallback
  showResult("Status kod tidak dikenalpasti.");
}

<script>
function showStyledResult(type, content, kod) {

  let boxClass = "";
  if (type === "success") boxClass = "box-success";
  if (type === "active") boxClass = "box-active";
  if (type === "error") boxClass = "box-error";

  document.getElementById("result").innerHTML = `
    <div class="result-box ${boxClass}">
      <div class="watermark">Sistem Rasmi Gadis QS</div>
      ${content}
      <div class="qr-badge" id="qrcode"></div>
    </div>
  `;

  if (type !== "error") {
    new QRCode(document.getElementById("qrcode"), {
      text: window.location.href + "?kod=" + kod,
      width: 100,
      height: 100
    });
  }
}

</script>

</body>
</html>
