<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Semakan Rasmi Kod Siri | Gadis QS HQ</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#d4af37">  
  
<style>
body{
  font-family:'Poppins',sans-serif;
  background:linear-gradient(135deg,#fff0f5,#ffe4ec);
  text-align:center;
  padding:30px;
}

.logo{
  width:140px;
  margin-bottom:20px;
}

.card{
  max-width:600px;
  margin:auto;
  background:#fff;
  padding:30px;
  border-radius:18px;
  box-shadow:0 10px 40px rgba(0,0,0,0.08);
  position:relative;
  overflow:hidden;
  animation:fadeIn 0.8s ease;
}

@keyframes fadeIn{
  from{opacity:0;transform:translateY(15px);}
  to{opacity:1;transform:translateY(0);}
}

.watermark{
  position:absolute;
  bottom:10px;
  right:15px;
  opacity:0.06;
  font-size:14px;
  font-weight:700;
}

input{
  padding:12px;
  width:80%;
  border-radius:8px;
  border:1px solid #ccc;
  margin-bottom:10px;
}

button{
  padding:12px 18px;
  border:none;
  border-radius:8px;
  background:#d4af37;
  color:#fff;
  cursor:pointer;
  font-weight:600;
}

.statusBox{
  margin-top:20px;
  padding:20px;
  border-radius:12px;
  font-weight:600;
}

.green{background:#e6fff0;border:2px solid #00aa55;}
.yellow{background:#fffbe6;border:2px solid #e6b800;}
.red{background:#ffe6e6;border:2px solid #cc0000;}

.badge{
  margin-top:10px;
  font-size:13px;
}
</style>
</head>
<body>

<img src="LOGO_URL_DISINI.png" class="logo">

<div class="card">

<h2>Semakan Rasmi Kod Siri</h2>

<input type="text" id="kodInput" placeholder="Masukkan Kod Siri">
<br>
<button onclick="checkKod()">Semak Sekarang</button>

<div id="result"></div>
<div id="map" style="height:300px;margin-top:20px;border-radius:12px;display:none;"></div>

<div class="watermark">Sistem Rasmi Gadis QS</div>
</div>

<script type="module">
  
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('/sw.js');
}
  
  let map;

function showMap(lat,lng,bandar){

  document.getElementById("map").style.display = "block";

  if(!map){
    map = L.map('map').setView([lat,lng], 12);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: 'Gadis QS HQ'
    }).addTo(map);
  }

  L.marker([lat,lng]).addTo(map)
    .bindPopup("Pemenang dari " + bandar)
    .openPopup();
}
  
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc, addDoc, collection, increment, updateDoc } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "XXXX",
  authDomain: "XXXX",
  projectId: "XXXX"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let attempt = 0;

function maskIC(ic){
  if(!ic) return "-";
  return ic.slice(0,8)+"XXXX";
}

window.checkKod = async function(){

  const kod = document.getElementById("kodInput").value.trim().toUpperCase();
  const result = document.getElementById("result");

  if(!kod) return;

  attempt++;
  if(attempt > 5){
    result.innerHTML = `<div class="statusBox red">
    ⚠ Terlalu banyak percubaan. Cuba lagi sebentar.
    </div>`;
    return;
  }

  const docRef = doc(db,"codes",kod);
  const snap = await getDoc(docRef);

  if(!snap.exists()){
    result.innerHTML = `
    <div class="statusBox red">
    ❌ STATUS KOD: TIDAK WUJUD
    </div>`;
    logAudit(kod,"TIDAK_WUJUD");
    return;
  }

  const data = snap.data();

  if(data.status === "SAH"){
  if(data.lat && data.lng){
   showMap(data.lat, data.lng, data.bandar);
  }
    result.innerHTML = `
    <div class="statusBox green">
    🟢 KOD SIRI: ${kod}<br>
    HADIAH: ${data.hadiah}<br>
    STATUS KOD: SAH / TELAH DITEBUS<br>
    PEMENANG: ${data.nama}<br>
    NO IC: ${maskIC(data.ic)}<br>
    DISAHKAN OLEH: GADIS QS HQ
    <br><br>
    <button onclick="downloadSijil('${kod}')">Muat Turun Sijil PDF</button>
    <div class="badge">✔ QR Verification Active</div>
    </div>`;
    logAudit(kod,"SAH");
    updateStat("sah");
  }

  else if(data.status === "AKTIF"){
    result.innerHTML = `
    <div class="statusBox yellow">
    🟡 KOD SIRI: ${kod}<br>
    HADIAH: ${data.hadiah}<br>
    STATUS KOD: AKTIF / BELUM DITEBUS<br>
    PEMBELIAN PRODUK: PACKAGE COMBO PRODUK QS<br>
    HARGA: RM500<br>
    STATUS PENEBUSAN: BELUM DITEBUS<br>
    DISAHKAN OLEH: GADIS QS HQ
    </div>`;
    logAudit(kod,"AKTIF");
    updateStat("aktif");
  }
};
  
async function logAudit(kod,status){
  await addDoc(collection(db,"audit_logs"),{
    kod:kod,
    status:status,
    timestamp:new Date(),
    device:navigator.userAgent
  });
}

async function updateStat(type){
  const statRef = doc(db,"system","stats");
  if(type==="sah"){
    await updateDoc(statRef,{sah:increment(1)});
  }
  if(type==="aktif"){
    await updateDoc(statRef,{aktif:increment(1)});
  }
}

window.downloadSijil = function(kod){
  window.open("https://verify.gadisqs.com/sijil/"+kod+".pdf");
};

// AUTO VERIFY DARI QR
const urlParams = new URLSearchParams(window.location.search);
const autoKod = urlParams.get('kod');
if(autoKod){
  document.getElementById("kodInput").value = autoKod;
  checkKod();
}

<script>
let deferredPrompt;

window.addEventListener('beforeinstallprompt', (e)=>{
  e.preventDefault();
  deferredPrompt = e;

  const installBtn = document.createElement("button");
  installBtn.innerText = "📱 Pasang Aplikasi Gadis QS";
  installBtn.style.marginTop="20px";
  installBtn.style.background="#00aa55";
  installBtn.style.color="#fff";
  installBtn.style.padding="12px";
  installBtn.style.borderRadius="8px";
  installBtn.style.border="none";

  document.querySelector(".card").appendChild(installBtn);

  installBtn.addEventListener("click", ()=>{
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(()=>{
      deferredPrompt = null;
      installBtn.remove();
    });
  });
});  
  
</script>
</body>
</html>
