
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Grand Finale Live</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body class="live">

<h1>GRAND FINALE</h1>
<div id="winnerDisplay">Menunggu Pengumuman...</div>

<script type="module" src="js/live.js"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<audio id="drumroll" src="assets/drumroll.mp3"></audio>

<script>
function celebrateWinner(){
  const audio = document.getElementById("drumroll");
  audio.play();

  setTimeout(()=>{
    confetti({
      particleCount: 200,
      spread: 120,
      origin: { y: 0.6 }
    });
  }, 2500);
}
</script>
  
</body>
</html>
