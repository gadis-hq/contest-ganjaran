<!DOCTYPE html>
<html lang="ms">
<head>

<link rel="stylesheet"

body{

color:#d4af37;

margin:auto;

</div>

<div class="box">
Total Ditebus<br>

</div>

<div class="box">
Belum Tebus<br>

</div>

</div>

<h3>Peta Pemenang Malaysia</h3>

<div id="map"></div>

<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
