<!DOCTYPE html>
<html lang="ms">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>GADIS QS GANJARAN</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>  
  
<style>

body{
font-family:Arial;
background:#fff0f5;
text-align:center;
}

h1{
color:#d4af37;
}

#reader{
width:300px;
margin:auto;
}

#map{
height:450px;
margin-top:30px;
}

.stat{
display:flex;
justify-content:center;
gap:20px;
margin:30px;
}

.box{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.box span{
font-size:28px;
font-weight:bold;
color:#d4af37;
}

.ticker{
width:100%;
overflow:hidden;
background:#d4af37;
color:white;
padding:8px 0;
font-weight:bold;
}

#tickerText{
white-space:nowrap;
display:inline-block;
padding-left:100%;
animation:tickerMove 35s linear infinite;
}

@keyframes tickerMove{
0%{transform:translateX(0)}
100%{transform:translateX(-100%)}
}
  
</style>

</head>

<div class="ticker">
<div id="tickerText"></div>
</div>  
<body>

<h1>GANJARAN GADIS QS</h1>

<h3>Scan Kod Siri</h3>

<div id="reader"></div>

<div class="stat">

<div class="box">
Total Kod Siri<br>
<span id="totalKod">0</span>
</div>

<div class="box">
Total Ditebus<br>
<span id="totalTebus">0</span>
</div>

<div class="box">
Belum Tebus<br>
<span id="totalBelum">0</span>
</div>

<div class="box">
Semakan Kod Seluruh Negara
<br>
<span id="totalSemakan">0</span>
</div>
  
</div>

<h3>Peta Pemenang Malaysia</h3>

<div id="map"></div>

<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="js/config.js"></script>
<script src="js/qrscan.js"></script>
<script src="js/map.js"></script>
<script src="js/dashboard.js"></script>

</body>
</html>
